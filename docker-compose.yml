services:
  kraken-bot:
    build:
      context: .
    restart: unless-stopped
    command: ["python", "-m", "kraken_bot.webui", "--config", "/config/config.yaml", "--host", "0.0.0.0", "--port", "8080", "--with-bot-loop"]
    ports:
      - "8080:8080"
    volumes:
      - ./config:/config:ro
      - ./data:/data
